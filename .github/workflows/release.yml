name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag to upload assets to (e.g. v1.0.1)"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: dotnet publish IosScreenCaptureTool/IosScreenCaptureTool.csproj -c Release -r win-x64 --self-contained true -p:DebugType=none -p:DebugSymbols=false -o artifacts/publish

      - name: Package
        run: Compress-Archive -Path artifacts/publish/* -DestinationPath artifacts/IosScreenCaptureTool-win-x64.zip

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/IosScreenCaptureTool-win-x64.zip
          tag_name: ${{ github.event_name == 'release' && github.event.release.tag_name || inputs.tag_name }}
