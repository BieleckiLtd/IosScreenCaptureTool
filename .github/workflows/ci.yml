name: CI

on:
  push:
    branches: ["master"]
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test IosScreenCaptureTool.Tests/IosScreenCaptureTool.Tests.csproj -c Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish IosScreenCaptureTool/IosScreenCaptureTool.csproj -c Release -r win-x64 --self-contained false -o artifacts/publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: IosScreenCaptureTool-win-x64
          path: artifacts/publish
